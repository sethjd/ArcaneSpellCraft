<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ARCANE SPELL CRAFT)</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 12px;
        }
        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            background: rgba(10, 14, 23, 0.7);
            backdrop-filter: blur(3px);
            border-radius: 2rem;
            padding: 12px;
        }
        .opponent-area, .player-area {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 1.5rem;
            margin: 8px 0;
            padding: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(110, 80, 160, 0.4);
            display: flex;
            flex-direction: column;
        }
        .opponent-area .stats {
            order: 2;
            margin-top: 8px;
            margin-bottom: 0;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            background: #03060ecc;
            padding: 8px 12px;
            border-radius: 2rem;
        }
        .hp {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffb347;
            text-shadow: 0 0 5px #ff7b00;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hp-label {
            font-size: 1rem;
            background: #00000066;
            padding: 4px 10px;
            border-radius: 2rem;
            color: #ddd;
        }
        .shard-pool { background: #241f3a; padding: 4px 12px; border-radius: 2rem; font-weight: bold; color: #d9c8ff; font-size: 0.9rem; }
        .hand, .battlefield {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 10px;
            padding: 8px 4px;
            margin-top: 8px;
            min-height: 140px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .card {
            background: #1e1a2f;
            border-radius: 1rem;
            width: 85px;
            flex-shrink: 0;
            padding: 6px 2px;
            text-align: center;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #7a5ac5;
            box-shadow: 0 4px 10px black;
            font-size: 0.7rem;
            font-weight: bold;
            color: #f0eef7;
            position: relative;
        }
        @media (min-width: 700px) {
            .card { width: 110px; font-size: 0.75rem; padding: 8px 4px; }
        }
        .card.creature { border-top: 4px solid #e34d4d; }
        .card.spell { border-top: 4px solid #4b9bff; }
        .card.economy { border-top: 4px solid #f5c542; }
        .card.oneshot { border-top: 4px solid #ff884d; }
        .card:active { transform: scale(0.97); background: #2f2a48; }
        .card.attacked {
            opacity: 0.6;
            filter: grayscale(0.3);
            cursor: not-allowed;
        }
        .card.attacked::after {
            content: "✘";
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 16px;
            font-weight: bold;
            color: #ff5555;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .card.face-down {
            background: #2a2a4a;
            border: 1px solid #aaa;
            color: #ccc;
            cursor: default;
        }
        .card.face-down::before {
            content: "???";
            font-size: 1.2rem;
            display: block;
            margin-top: 20px;
        }
        .card.revealed-temp {
            animation: fadeOutCard 10s forwards;
            pointer-events: none;
        }
        @keyframes fadeOutCard {
            0% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9); display: none; }
        }
        .shop-row {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 12px;
            background: #00000066;
            padding: 12px;
            border-radius: 1.5rem;
            margin: 12px 0;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .shop-card {
            background: #2a1f3c;
            width: 95px;
            flex-shrink: 0;
            border: 2px solid #ffd966;
        }
        @media (min-width: 700px) {
            .shop-card { width: 110px; }
        }
        button {
            background: #5e3a9c;
            border: none;
            padding: 10px 16px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.05s;
            font-size: 1rem;
            touch-action: manipulation;
        }
        button:active { transform: scale(0.96); background: #3c2a6b; }
        .end-turn {
            background: #aa2e4e;
            font-size: 1.2rem;
            padding: 12px;
            width: 100%;
            margin-top: 8px;
        }
        .restart-btn {
            background: #2a6b3c;
            font-size: 1rem;
            padding: 10px;
            margin-top: 8px;
            width: 100%;
        }
        .log {
            background: #03050be0;
            border-radius: 1rem;
            padding: 8px 12px;
            margin-top: 12px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.75rem;
            color: #bdadff;
        }
        .targetable { cursor: pointer; border: 2px solid #ffaa33; }
        .disabled-target { opacity: 0.5; cursor: not-allowed; }
        .debug-area {
            margin-top: 10px;
            background: #0a0c14;
            border-radius: 1rem;
            padding: 8px;
        }
        .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .debug-header button {
            background: #2a2a4a;
            padding: 4px 12px;
            font-size: 0.7rem;
        }
        .debug-area textarea {
            width: 100%;
            background: #1a1a2e;
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            border-radius: 0.5rem;
            border: 1px solid #3a3a5a;
            padding: 6px;
            resize: vertical;
            display: none;
        }
        .debug-area textarea.visible {
            display: block;
        }
        .action-buttons { margin-top: 10px; }
        .attack-instruction { color: #ffaa66; font-size: 0.7rem; margin: 5px 0; text-align: center; }
        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .game-over-box {
            background: #1e1a2f;
            border-radius: 2rem;
            padding: 24px;
            text-align: center;
            border: 2px solid #ffd966;
            max-width: 280px;
            width: 80%;
        }
        .game-over-box h2 {
            margin: 0 0 16px 0;
            font-size: 2rem;
        }
        .game-over-box button {
            background: #5e3a9c;
            padding: 12px 24px;
            font-size: 1.2rem;
            margin-top: 8px;
        }
        .victory { color: #4cff4c; }
        .defeat { color: #ff5555; }
        .cloak-active {
            background: #4433aa88;
            border: 1px solid #aa88ff;
            box-shadow: 0 0 8px #8866ff;
        }
        .battlefield-header, .hand-header {
            font-weight: bold;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="opponent-area">
        <div class="battlefield-header">⚔️ AI BATTLEFIELD</div>
        <div id="aiBattlefield" class="battlefield"></div>
        <div class="hand-header">🃏 AI HAND (face down)</div>
        <div id="aiHand" class="hand"></div>
        <div class="stats">
            <div class="hp"><span class="hp-label">🤖 AI</span> <span id="aiHp">80</span></div>
            <span class="shard-pool">🔮 <span id="aiShardDisplay">0</span></span>
        </div>
    </div>

    <div class="shop-row" id="shopContainer"></div>

    <div class="player-area">
        <div class="stats">
            <div class="hp"><span class="hp-label">✨ YOU</span> <span id="playerHp">80</span></div>
            <span class="shard-pool">💎 <span id="playerShardDisplay">0</span></span>
            <button id="endTurnBtn" class="end-turn">🔚 END TURN</button>
        </div>
        <div><strong>🃏 YOUR HAND</strong></div>
        <div id="playerHand" class="hand"></div>
        <div><strong>🛡️ YOUR CREATURES</strong></div>
        <div id="playerBattlefield" class="battlefield"></div>
        <div class="action-buttons">
            <div class="attack-instruction">💡 Tap creature → tap enemy to attack (✘ = already attacked)</div>
            <button id="restartBtn" class="restart-btn">🔄 RESTART GAME</button>
        </div>
    </div>
    <div class="log" id="gameLog"></div>
    <div class="debug-area">
        <div class="debug-header">
            <span>🔍 AI DEBUG</span>
            <button id="toggleDebugBtn" class="toggle-debug">Show Log</button>
            <button id="copyDebugBtn" style="background:#2a2a4a;">Copy</button>
        </div>
        <textarea id="debugLog" rows="4" readonly></textarea>
    </div>
</div>

<script>

        { id: "surge", name: "Arcane Surge", type: "spell", shopCost: 2, effect: "damage", damage: 2, desc: "⚡ 2 damage" },
        { id: "healwave", name: "Healing Wave", type: "spell", shopCost: 3, effect: "heal", heal: 5, desc: "💚 Heal 5 HP" },

        { id: "cloak", name: "Ethereal Cloak", type: "spell", shopCost: 3, effect: "cloak", desc: "✨ You + creatures Immune for opponent's next turn" },
        { id: "mindcontrol", name: "Mind Control", type: "spell", shopCost: 5, effect: "mindControl", desc: "🧠 Steal enemy creature" },
        { id: "thunderstrike", name: "Thunderstrike", type: "spell", shopCost: 4, effect: "thunderstrike", damage:4, desc: "🌩️ 4 dmg to 1-2 targets" },
        { id: "fire_ele", name: "Fire Elemental", type: "creature", shopCost: 4, atk:4, hp:6, element:true, desc: "🔥 4/6 Elemental" },
        { id: "earth_ele", name: "Earth Elemental", type: "creature", shopCost: 4, atk:4, hp:6, element:true, desc: "🌍 4/6 Elemental" },
        { id: "water_ele", name: "Water Elemental", type: "creature", shopCost: 4, atk:4, hp:6, element:true, desc: "💧 4/6 Elemental" },
        { id: "storm_ele", name: "Storm Elemental", type: "creature", shopCost: 4, atk:4, hp:6, element:true, desc: "🌪️ 4/6 Elemental" },
        { id: "frostwolf", name: "Frostwolf Pack", type: "creature", shopCost: 3, atk:2, hp:4, desc: "🐺 2/4" },
        { id: "panther", name: "Shadow Panther", type: "creature", shopCost: 3, atk:2, hp:4, desc: "🐈‍⬛ 2/4" },
        { id: "hydra", name: "Venomous Hydra", type: "creature", shopCost: 2, atk:2, hp:2, desc: "🐍 2/2" },
        { id: "unicorn", name: "Celestial Unicorn", type: "creature", shopCost: 3, atk:0, hp:4, startHeal:2, desc: "🦄 0/4, heals you 2 at end of turn" },
        { id: "golem", name: "Earth Golem", type: "creature", shopCost: 6, atk:0, hp:6, defender:true, onSummonDiscard:true, desc: "🛡️ 0/6 Defender, discard enemy card" },
        { id: "treant", name: "Ancient Treant", type: "creature", shopCost: 2, atk:0, hp:10, defender:true, desc: "🌳 0/10 Defender" },
        { id: "frostshield_creature", name: "Frost Shield", type: "creature", shopCost: 2, atk:0, hp:4, defender:true, desc: "❄️ 0/4 Defender" },
        { id: "thunderbird", name: "Thunderbird", type: "creature", shopCost: 4, atk:4, hp:5, thunderSynergy:true, desc: "🦅 4/5, boosts Thunderstrike" },
        { id: "behemoth", name: "Ironclad Behemoth", type: "creature", shopCost: 7, atk:5, hp:10, desc: "🦣 5/10" },
        { id: "wraith", name: "Spectral Wraith", type: "oneshot", shopCost: 4, effect: "damage", damage: 4, desc: "👻 Deal 4 damage" },
        { id: "lavadrake", name: "Lava Drake", type: "oneshot", shopCost: 5, effect: "damage", damage: 10, desc: "🐉 Deal 10 damage" },
        { id: "souleater", name: "Soul Eater", type: "oneshot", shopCost: 6, effect: "damage", damage: 4, desc: "💀 Deal 4 damage" },
        { id: "phoenix", name: "Phoenix Reborn", type: "oneshot", shopCost: 7, effect: "revive", desc: "🔥 Revive 1 creature from graveyard (full HP)" }
    ];

    function buildCentralDeck() {
        let deck = [];
        const mult = {
            inferno:4, surge:3, healwave:3, frostshield_spell:3, cloak:3, mindcontrol:1, thunderstrike:3,
            fire_ele:3, earth_ele:3, water_ele:3, storm_ele:3, frostwolf:3, panther:3, hydra:3, unicorn:3,
            golem:2, treant:2, frostshield_creature:2, thunderbird:2, behemoth:2,
            wraith:3, lavadrake:2, souleater:2, phoenix:1
        };
        for(let card of CARD_DB) {
            let count = mult[card.id] || 0;
            for(let i=0;i<count;i++) deck.push({...card, uid: Math.random()});
        }
        return shuffleArray(deck);
    }
    function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

    let arcaneClustersRemaining = 6;
    const ARCINE_CLUSTER_CARD = { id: "cluster", name: "Arcane Cluster", type: "economy", shopCost: 3, shardGain: 3, desc: "🔮 +3 Shards" };
    const SHARD_CARD_TEMPLATE = { id: "shard", name: "Shard Card", type: "economy", shardGain: 1, desc: "💎 +1 Shard" };

    let centralDeck = [], shopCards = [];
    let player = { hp:80, field:[], hand:[], deck:[], discard:[], graveyard:[], shards:0, attackedThisTurn: new Set(), cloakActive: false };
    let ai = { hp:80, field:[], hand:[], deck:[], discard:[], graveyard:[], shards:0, attackedThisTurn: new Set(), cloakActive: false };
    let gameActive = true, turn = "player";
    let pendingSpellCallback = null;
    let pendingAttacker = null;
    let logMessages = [];
    let tempRevealedCards = []; // store { card, element, timeoutId }

    function addLog(msg) { logMessages.unshift(msg); if(logMessages.length>15) logMessages.pop(); document.getElementById("gameLog").innerHTML = logMessages.map(m=>`✨ ${m}`).join('<br>'); }
    function debug(msg) { let db = document.getElementById("debugLog"); if(db) db.value += msg + "\n"; console.log(msg); }

    function makeStarterDeck() {
        let starter = [];
        for(let i=0;i<5;i++) starter.push({...SHARD_CARD_TEMPLATE, uid: Math.random()});
        starter.push({...CARD_DB.find(c=>c.id==="inferno"), uid: Math.random()});
        starter.push({...CARD_DB.find(c=>c.id==="surge"), uid: Math.random()});
        return shuffleArray(starter);
    }

    function initGame() {
        centralDeck = buildCentralDeck();
        shopCards = [];
        for(let i=0;i<4 && centralDeck.length;i++) shopCards.push(centralDeck.shift());
        arcaneClustersRemaining = 6;
        player = { hp:80, field:[], hand:[], deck:makeStarterDeck(), discard:[], graveyard:[], shards:0, attackedThisTurn: new Set(), cloakActive: false };
        ai = { hp:80, field:[], hand:[], deck:makeStarterDeck(), discard:[], graveyard:[], shards:0, attackedThisTurn: new Set(), cloakActive: false };
        gameActive = true;
        turn = "player";
        pendingAttacker = null;
        pendingSpellCallback = null;
        tempRevealedCards = [];
        refreshUI();
        addLog("Game ready! AI played cards appear face‑up in hand for 10 seconds.");
        startPlayerTurn();
    }

    function drawCard(p) {
        if(p.deck.length===0) {
            if(p.discard.length===0) return null;
            p.deck = shuffleArray([...p.discard]);
            p.discard = [];
            addLog(`${p===player?"You":"AI"} reshuffles discard.`);
        }
        let card = p.deck.pop();
        p.hand.push(card);
        return card;
    }

    function startPlayerTurn() {
        if(!gameActive) return;
        player.cloakActive = false;
        player.shards = 0;
        player.attackedThisTurn.clear();
        for(let i=0;i<5;i++) drawCard(player);
        refreshUI();
        addLog("Your turn.");
    }

    function startAITurn() {
        if(!gameActive) return;
        ai.cloakActive = false;
        ai.shards = 0;
        ai.attackedThisTurn.clear();
        for(let i=0;i<5;i++) drawCard(ai);
        refreshUI();
        addLog("AI's turn.");
        aiTurnLogic();
    }

    function getLegalDamageTargets(attackerOwner, isSpell = false) {
        let defender = attackerOwner === player ? ai : player;
        let hasDefender = defender.field.some(c=>c.defender===true);
        if(hasDefender) {
            return defender.field.filter(c=>c.defender===true);
        } else {
            return [...defender.field, defender];
        }
    }

    function isDamageBlockedByCloak(target, attackerOwner) {
        if(target === player && player.cloakActive) return true;
        if(target === ai && ai.cloakActive) return true;
        if(target.owner === player && player.cloakActive) return true;
        if(target.owner === ai && ai.cloakActive) return true;
        return false;
    }

    // Add temporary revealed card to AI hand area
    function addTempRevealedCard(card) {
        let handContainer = document.getElementById("aiHand");
        let cardDiv = document.createElement("div");
        cardDiv.className = `card ${card.type} revealed-temp`;
        let displayText = `<b>${card.name}</b><br>`;
        if(card.type === "economy") {
            displayText += `💰 +${card.shardGain}<br>${card.desc || ""}`;
        } else if(card.type === "spell" || card.type === "oneshot") {
            if(card.damage) displayText += `⚔️ ${card.damage}<br>${card.desc || ""}`;
            else displayText += `${card.desc || ""}`;
        } else if(card.type === "creature") {
            displayText += `⚔️${card.atk} ❤️${card.hp}<br>${card.desc || ""}`;
        } else {
            displayText += `${card.desc || ""}`;
        }
        cardDiv.innerHTML = displayText;
        handContainer.appendChild(cardDiv);
        let timeoutId = setTimeout(() => {
            if(cardDiv && cardDiv.remove) cardDiv.remove();
            tempRevealedCards = tempRevealedCards.filter(t => t.timeoutId !== timeoutId);
        }, 10000);
        tempRevealedCards.push({ card, element: cardDiv, timeoutId });
    }

    function playCardFromHand(owner, card, target=null) {
        let idx = owner.hand.findIndex(c=>c.uid===card.uid);
        if(idx===-1) return false;
        owner.hand.splice(idx,1);
        if(owner === ai) {
            // Show the card as a temporary revealed card in the hand area
            addTempRevealedCard(card);
        }
        
        if(card.type === "economy") {
            owner.shards += card.shardGain;
            addLog(`${owner===player?"You":"AI"} play ${card.name} +${card.shardGain} shards.`);
            owner.discard.push(card);
        }
        else if(card.type === "spell") {
            resolveSpellOrOneshot(owner, card, target);
            owner.discard.push(card);
        }
        else if(card.type === "creature") {
            let newCreature = {...card, currentHp: card.hp, owner:owner, defender:card.defender||false, elemental:card.elemental||false, thunderSynergy:card.thunderSynergy||false, startHeal:card.startHeal||false, originalHp: card.hp};
            if(card.onSummonDiscard && owner===player && ai.hand.length) {
                let discarded = ai.hand.pop();
                addLog(`Earth Golem makes AI discard ${discarded.name}.`);
            }
            owner.field.push(newCreature);
            addLog(`Summoned ${card.name} (${card.atk}/${card.hp}).`);
        }
        else if(card.type === "oneshot") {
            resolveSpellOrOneshot(owner, card, target);
            owner.discard.push(card);
        }
        refreshUI();
        return true;
    }

    function resolveSpellOrOneshot(owner, card, target) {
